<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src http://localhost:*;">
  <title>Exile Insight Overlay</title>
  <style>
    :root {
      --bg: rgba(10, 8, 6, 0.95);
      --bg-card: rgba(22, 18, 14, 0.98);
      --border: rgba(120, 90, 40, 0.35);
      --border-gold: rgba(180, 140, 50, 0.5);
      --text: #d4c8b0;
      --text-dim: #8a7e6a;
      --gold: #c8a84e;
      --green: #22c55e;
      --red: #ef4444;
      --blue: #8888ff;
      --yellow: #ffff77;
      --orange: #af6025;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: transparent;
      color: var(--text);
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .overlay-container {
      background: var(--bg);
      border: 1px solid var(--border-gold);
      border-radius: 6px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.8),
                  0 0 1px rgba(200, 168, 78, 0.3);
      max-width: 420px;
      min-width: 320px;
      overflow: hidden;
      -webkit-app-region: no-drag;
    }

    /* Header */
    .overlay-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      background: rgba(30, 24, 16, 0.9);
      border-bottom: 1px solid var(--border);
    }

    .overlay-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--gold);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .overlay-close {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 14px;
      padding: 2px 6px;
      border-radius: 3px;
    }
    .overlay-close:hover { color: var(--red); background: rgba(239,68,68,0.1); }

    /* Item Name */
    .item-header {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
    }

    .item-name {
      font-size: 14px;
      font-weight: 600;
    }
    .item-name.normal { color: #c8c8c8; }
    .item-name.magic { color: var(--blue); }
    .item-name.rare { color: var(--yellow); }
    .item-name.unique { color: var(--orange); }

    .item-base {
      font-size: 11px;
      color: var(--text-dim);
      margin-top: 2px;
    }

    /* Price Section */
    .price-section {
      padding: 10px 12px;
      background: rgba(20, 16, 10, 0.6);
    }

    .price-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }

    .price-box {
      text-align: center;
      padding: 6px;
      background: rgba(10, 8, 6, 0.5);
      border-radius: 4px;
      border: 1px solid rgba(120, 90, 40, 0.15);
    }

    .price-label {
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 2px;
    }

    .price-value {
      font-size: 16px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }

    .price-value.low { color: var(--green); }
    .price-value.mid { color: var(--gold); }
    .price-value.count { color: var(--text); }

    .price-currency {
      font-size: 10px;
      color: var(--text-dim);
    }

    /* Listings */
    .listings-section {
      padding: 8px 12px;
      max-height: 200px;
      overflow-y: auto;
    }

    .listings-title {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--text-dim);
      margin-bottom: 6px;
    }

    .listing-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 0;
      font-size: 12px;
      border-bottom: 1px solid rgba(120, 90, 40, 0.1);
    }

    .listing-price {
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      color: var(--gold);
    }

    .listing-seller {
      color: var(--text-dim);
      font-size: 11px;
      max-width: 120px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .listing-time {
      color: var(--text-dim);
      font-size: 10px;
    }

    /* Verdict */
    .verdict-section {
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .verdict-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .verdict-badge.sell { background: rgba(34,197,94,0.15); color: var(--green); border: 1px solid rgba(34,197,94,0.3); }
    .verdict-badge.keep { background: rgba(200,168,78,0.15); color: var(--gold); border: 1px solid rgba(200,168,78,0.3); }
    .verdict-badge.craft { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .verdict-badge.vendor { background: rgba(239,68,68,0.15); color: var(--red); border: 1px solid rgba(239,68,68,0.3); }
    .verdict-badge.price_check { background: rgba(168,85,247,0.15); color: #c084fc; border: 1px solid rgba(168,85,247,0.3); }

    .verdict-summary {
      font-size: 11px;
      color: var(--text-dim);
      flex: 1;
    }

    .verdict-score {
      font-size: 13px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      color: var(--gold);
    }

    /* Trade link */
    .trade-link {
      display: block;
      padding: 6px 12px;
      text-align: center;
      font-size: 11px;
      color: var(--gold);
      text-decoration: none;
      background: rgba(200, 168, 78, 0.08);
      border-top: 1px solid var(--border);
      cursor: pointer;
    }
    .trade-link:hover { background: rgba(200, 168, 78, 0.15); }

    /* Loading state */
    .loading {
      padding: 24px;
      text-align: center;
      color: var(--text-dim);
      font-size: 12px;
    }

    .loading-spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Error state */
    .error-state {
      padding: 16px;
      text-align: center;
      color: var(--red);
      font-size: 12px;
    }

    /* Hotkey hint */
    .hotkey-hint {
      padding: 4px 12px 6px;
      text-align: center;
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.3px;
    }

    kbd {
      background: rgba(120, 90, 40, 0.15);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      font-size: 9px;
      font-family: monospace;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
  <div class="overlay-container" id="container">
    <!-- Header -->
    <div class="overlay-header">
      <span class="overlay-title">Exile Insight</span>
      <button class="overlay-close" id="btnClose" title="Close (Escape)">✕</button>
    </div>

    <!-- Dynamic Content -->
    <div id="content">
      <div class="loading">
        <div class="loading-spinner"></div>
        Checking price...
      </div>
    </div>
  </div>

  <script>
    const api = window.exileInsight;
    const content = document.getElementById('content');
    const btnClose = document.getElementById('btnClose');

    // Close overlay
    btnClose.addEventListener('click', () => api.closeOverlay());
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') api.closeOverlay();
    });

    // Currency labels
    const currencyLabels = {
      chaos: 'c', divine: 'div', exalted: 'ex',
      alch: 'alch', vaal: 'vaal', unknown: '?'
    };

    function formatPrice(amount, currency) {
      const label = currencyLabels[currency] || currency;
      if (!amount || amount === 0) return 'N/A';
      return `${amount % 1 === 0 ? amount : amount.toFixed(1)} ${label}`;
    }

    function timeAgo(indexed) {
      if (!indexed || indexed === 'average') return indexed || '';
      try {
        const diff = Date.now() - new Date(indexed).getTime();
        const mins = Math.floor(diff / 60000);
        if (mins < 60) return `${mins}m`;
        const hrs = Math.floor(mins / 60);
        if (hrs < 24) return `${hrs}h`;
        return `${Math.floor(hrs / 24)}d`;
      } catch { return ''; }
    }

    // Receive price check results
    api.onPriceCheckResult((data) => {
      if (data.error) {
        content.innerHTML = `<div class="error-state">${data.error}</div>
          <div class="hotkey-hint"><kbd>Esc</kbd> to close · <kbd>Ctrl+D</kbd> to check again</div>`;
        return;
      }

      const { parsed, evaluation, trade } = data;
      const rarityClass = parsed.rarity.toLowerCase();

      // Price overview
      const listings = trade?.listings?.filter(l => !l.id.startsWith('hint-') && l.price.amount > 0) || [];
      const prices = listings.map(l => l.price.amount).sort((a, b) => a - b);
      const lowest = prices[0];
      const median = prices.length > 0 ? prices[Math.floor(prices.length / 2)] : null;
      const currency = listings[0]?.price?.currency || 'chaos';

      let html = '';

      // Item header
      html += `<div class="item-header">
        <div class="item-name ${rarityClass}">${parsed.name}</div>
        ${parsed.name !== parsed.baseType ? `<div class="item-base">${parsed.baseType} · iLvl ${parsed.itemLevel} · ${parsed.itemClass}</div>` : `<div class="item-base">iLvl ${parsed.itemLevel} · ${parsed.itemClass}</div>`}
      </div>`;

      // Price overview (if we have real listings)
      if (listings.length > 0) {
        const label = currencyLabels[currency] || currency;
        html += `<div class="price-section"><div class="price-grid">
          <div class="price-box">
            <div class="price-label">Lowest</div>
            <div class="price-value low">${formatPrice(lowest, currency)}</div>
          </div>
          <div class="price-box">
            <div class="price-label">Median</div>
            <div class="price-value mid">${formatPrice(median, currency)}</div>
          </div>
          <div class="price-box">
            <div class="price-label">Listed</div>
            <div class="price-value count">${trade.total || listings.length}</div>
          </div>
        </div></div>`;
      } else if (evaluation.priceEstimate) {
        // poe.ninja estimate
        html += `<div class="price-section"><div class="price-grid">
          <div class="price-box">
            <div class="price-label">poe.ninja</div>
            <div class="price-value mid">${evaluation.priceEstimate.chaosValue.toFixed(0)}c</div>
          </div>
          <div class="price-box">
            <div class="price-label">Divine</div>
            <div class="price-value count">${evaluation.priceEstimate.divineValue.toFixed(2)}d</div>
          </div>
          <div class="price-box">
            <div class="price-label">Source</div>
            <div class="price-value count" style="font-size:11px">${evaluation.priceEstimate.source}</div>
          </div>
        </div></div>`;
      }

      // Top 5 listings
      if (listings.length > 0) {
        html += `<div class="listings-section"><div class="listings-title">Recent Listings</div>`;
        listings.slice(0, 5).forEach(l => {
          html += `<div class="listing-row">
            <span class="listing-price">${formatPrice(l.price.amount, l.price.currency)}</span>
            <span class="listing-seller">${l.seller}</span>
            <span class="listing-time">${timeAgo(l.listed)}</span>
          </div>`;
        });
        html += `</div>`;
      }

      // Verdict
      if (evaluation) {
        html += `<div class="verdict-section">
          <span class="verdict-badge ${evaluation.verdict}">${evaluation.verdict.replace('_', ' ')}</span>
          <span class="verdict-summary">${evaluation.verdictSummary}</span>
          <span class="verdict-score">${evaluation.score}/100</span>
        </div>`;
      }

      // Trade link
      if (trade?.tradeUrl) {
        html += `<a class="trade-link" id="tradeLink" data-url="${trade.tradeUrl}">Open on Trade Site ↗</a>`;
      }

      // Hotkey hint
      html += `<div class="hotkey-hint"><kbd>Esc</kbd> close · <kbd>Ctrl+D</kbd> new check · <kbd>Ctrl+Shift+D</kbd> toggle overlay</div>`;

      content.innerHTML = html;

      // Wire trade link
      const tradeLink = document.getElementById('tradeLink');
      if (tradeLink) {
        tradeLink.addEventListener('click', () => {
          api.openExternal(tradeLink.dataset.url);
        });
      }
    });
  </script>
</body>
</html>
